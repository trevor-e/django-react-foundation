name: __PROJECT___test

services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: __PROJECT___test
      POSTGRES_USER: __PROJECT___test
      POSTGRES_PASSWORD: __PROJECT___test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U __PROJECT___test"]
      interval: 2s
      timeout: 2s
      retries: 20
