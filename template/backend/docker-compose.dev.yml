# Explicit project name: without it compose namespaces by folder ("backend"),
# and two projects' containers collide on this machine.
name: __PROJECT___dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: __PROJECT__
      POSTGRES_USER: __PROJECT__
      POSTGRES_PASSWORD: __PROJECT__
    ports:
      - "5432:5432"
    volumes:
      - __PROJECT___postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U __PROJECT__"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  __PROJECT___postgres_data:
